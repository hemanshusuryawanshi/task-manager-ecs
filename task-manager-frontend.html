<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager — AWS ECS Fargate Demo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0B1220;
    --panel: #121B2E;
    --panel-hover: #16213A;
    --border: #232E47;
    --text: #E8ECF3;
    --text-muted: #8A93A6;
    --accent: #22D3B8;
    --accent-dim: #1A9E8C;
    --danger: #E8615A;
    --pending: #E8A23A;
    --completed: #22D3B8;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: radial-gradient(circle at top left, #0F1830 0%, #0B1220 55%);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    padding: 48px 24px;
  }
  .wrap { max-width: 760px; margin: 0 auto; }

  header { margin-bottom: 32px; }
  .eyebrow {
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--text-muted);
    box-shadow: 0 0 0 0 rgba(34,211,184,0.6);
  }
  .dot.live { background: var(--accent); animation: pulse 2s infinite; }
  .dot.down { background: var(--danger); }
  @keyframes pulse {
    0% { box-shadow: 0 0 0 0 rgba(34,211,184,0.5); }
    70% { box-shadow: 0 0 0 8px rgba(34,211,184,0); }
    100% { box-shadow: 0 0 0 0 rgba(34,211,184,0); }
  }
  h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
  }
  .subtitle { color: var(--text-muted); font-size: 14px; margin-top: 6px; }

  .config {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 24px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .config label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
    white-space: nowrap;
  }
  .config input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 10px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12px;
  }
  .config input:focus { outline: none; border-color: var(--accent); }
  .config button {
    background: var(--accent);
    color: #08201C;
    border: none;
    border-radius: 6px;
    padding: 8px 14px;
    font-weight: 600;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
  }
  .config button:hover { background: var(--accent-dim); }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    margin-bottom: 20px;
  }
  .panel h2 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }

  form { display: flex; flex-direction: column; gap: 10px; }
  .row { display: flex; gap: 10px; }
  input[type=text], textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    padding: 11px 12px;
    font-size: 14px;
    font-family: 'Inter', sans-serif;
  }
  input[type=text]:focus, textarea:focus { outline: none; border-color: var(--accent); }
  textarea { resize: vertical; min-height: 44px; }
  .add-btn {
    background: var(--accent);
    color: #08201C;
    border: none;
    border-radius: 8px;
    padding: 12px;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .add-btn:hover { background: var(--accent-dim); }
  .add-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .task-list { display: flex; flex-direction: column; gap: 10px; }
  .task {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    transition: border-color 0.15s;
  }
  .task:hover { border-color: #2C3A5A; }
  .task-check {
    width: 20px; height: 20px;
    border-radius: 6px;
    border: 2px solid var(--border);
    flex-shrink: 0;
    margin-top: 2px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }
  .task-check.done { background: var(--completed); border-color: var(--completed); }
  .task-check.done::after { content: "✓"; color: #08201C; font-size: 13px; font-weight: 700; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 14.5px; font-weight: 500; word-break: break-word; }
  .task-title.done { text-decoration: line-through; color: var(--text-muted); }
  .task-desc { font-size: 13px; color: var(--text-muted); margin-top: 3px; word-break: break-word; }
  .task-meta {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    color: var(--text-muted);
    margin-top: 8px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  .badge.pending { background: rgba(232,162,58,0.15); color: var(--pending); }
  .badge.completed { background: rgba(34,211,184,0.15); color: var(--completed); }
  .del-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 6px;
    flex-shrink: 0;
  }
  .del-btn:hover { color: var(--danger); background: rgba(232,97,90,0.1); }

  .empty {
    text-align: center;
    padding: 32px 0;
    color: var(--text-muted);
    font-size: 13px;
  }
  .error-banner {
    background: rgba(232,97,90,0.1);
    border: 1px solid rgba(232,97,90,0.3);
    color: var(--danger);
    border-radius: 8px;
    padding: 12px 14px;
    font-size: 13px;
    margin-bottom: 16px;
    display: none;
    font-family: 'JetBrains Mono', monospace;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="eyebrow"><span class="dot" id="statusDot"></span><span id="statusText">checking connection…</span></div>
    <h1>Task Manager</h1>
    <div class="subtitle">Flask · Docker · ECR · ECS Fargate · ALB · DynamoDB</div>
  </header>

  <div class="config">
    <label for="apiUrl">API_BASE_URL</label>
    <input type="text" id="apiUrl" value="http://task-manager-alb-hemanshu2026-1237158019.ap-south-1.elb.amazonaws.com">
    <button onclick="checkHealth()">Reconnect</button>
  </div>

  <div class="error-banner" id="errorBanner"></div>

  <div class="panel">
    <h2>New task</h2>
    <form id="taskForm">
      <input type="text" id="titleInput" placeholder="Task title" required>
      <textarea id="descInput" placeholder="Description (optional)"></textarea>
      <button type="submit" class="add-btn" id="addBtn">Add task</button>
    </form>
  </div>

  <div class="panel">
    <h2>Tasks</h2>
    <div class="task-list" id="taskList">
      <div class="empty">Loading tasks…</div>
    </div>
  </div>
</div>

<script>
let API_BASE = document.getElementById('apiUrl').value.replace(/\/$/, '');

document.getElementById('apiUrl').addEventListener('change', (e) => {
  API_BASE = e.target.value.replace(/\/$/, '');
  checkHealth();
  loadTasks();
});

function showError(msg) {
  const banner = document.getElementById('errorBanner');
  banner.textContent = msg;
  banner.style.display = 'block';
}
function hideError() {
  document.getElementById('errorBanner').style.display = 'none';
}

async function checkHealth() {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  try {
    const res = await fetch(`${API_BASE}/health`);
    if (!res.ok) throw new Error('bad status');
    dot.className = 'dot live';
    text.textContent = 'connected — ' + API_BASE.replace('http://', '');
    hideError();
  } catch (err) {
    dot.className = 'dot down';
    text.textContent = 'not reachable';
    showError('Could not reach the API. If this is your first time loading the page, your Flask app likely needs CORS enabled — see the note below the app, or check the API_BASE_URL above is correct.');
  }
}

async function loadTasks() {
  const list = document.getElementById('taskList');
  try {
    const res = await fetch(`${API_BASE}/tasks`);
    const tasks = await res.json();
    if (!tasks.length) {
      list.innerHTML = '<div class="empty">No tasks yet — add one above.</div>';
      return;
    }
    tasks.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
    list.innerHTML = tasks.map(renderTask).join('');
  } catch (err) {
    list.innerHTML = '<div class="empty">Couldn\'t load tasks. Check the connection above.</div>';
  }
}

function renderTask(t) {
  const done = t.status === 'completed';
  const created = new Date(t.created_at).toLocaleString();
  return `
    <div class="task">
      <div class="task-check ${done ? 'done' : ''}" onclick="toggleTask('${t.task_id}', '${done ? 'pending' : 'completed'}')"></div>
      <div class="task-body">
        <div class="task-title ${done ? 'done' : ''}">${escapeHtml(t.title)}</div>
        ${t.description ? `<div class="task-desc">${escapeHtml(t.description)}</div>` : ''}
        <div class="task-meta">
          <span class="badge ${done ? 'completed' : 'pending'}">${t.status}</span>
          <span>${created}</span>
        </div>
      </div>
      <button class="del-btn" onclick="deleteTask('${t.task_id}')" title="Delete">✕</button>
    </div>
  `;
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

async function toggleTask(id, newStatus) {
  try {
    await fetch(`${API_BASE}/tasks/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ status: newStatus })
    });
    loadTasks();
  } catch (err) {
    showError('Failed to update task.');
  }
}

async function deleteTask(id) {
  try {
    await fetch(`${API_BASE}/tasks/${id}`, { method: 'DELETE' });
    loadTasks();
  } catch (err) {
    showError('Failed to delete task.');
  }
}

document.getElementById('taskForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const title = document.getElementById('titleInput').value.trim();
  const description = document.getElementById('descInput').value.trim();
  if (!title) return;
  const btn = document.getElementById('addBtn');
  btn.disabled = true;
  try {
    await fetch(`${API_BASE}/tasks`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title, description, status: 'pending' })
    });
    document.getElementById('titleInput').value = '';
    document.getElementById('descInput').value = '';
    loadTasks();
  } catch (err) {
    showError('Failed to add task.');
  } finally {
    btn.disabled = false;
  }
});

checkHealth();
loadTasks();
</script>
</body>
</html>
